services:
  postgres:
    image: postgres:17-alpine
    container_name: ai-workspace-db
    environment:
      POSTGRES_USER: aiworkspace
      POSTGRES_PASSWORD: aiworkspace
      POSTGRES_DB: aiworkspace
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aiworkspace"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: ai-workspace-redis
    ports:
      - "6380:6379"
    volumes:
      - redisdata:/data
    command: redis-server --appendonly yes

volumes:
  pgdata:
  redisdata:
